<div id="signup">
  <div class="container-custom">
        <div class="form-container">
            <img src="/assets/images/OIP.jpeg" alt="Brasão da cidade" class="logo">
            <form (submit)="onSubmit($event)">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Email" [(ngModel)]="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" placeholder="Nome Completo" [(ngModel)]="name"  name="name" required>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Telefone</label>
                        <input type="tel" class="form-control" placeholder="Telefone" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Data de Nascimento</label>
                        <input type="date" class="form-control" [(ngModel)]="birthdate" name="birthdate" required>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-control" placeholder="Senha" [(ngModel)]="password" name="password" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Confirmar Senha</label>
                        <input type="password" class="form-control" placeholder="Confirmar Senha" [(ngModel)]="confirmPassword" name="confirmPassword" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-orange">Cadastrar</button>
            </form>
        </div>
        <div class="image-container">
        </div>
    </div>
</div>
