<div class="conteudo-principal">
  <div class="barra-superior">
    <div>
      <a href="#">ACESSIBILIDADE</a>
      <a href="#">A-</a>
      <a href="#">A</a>
      <a href="#">A+</a>
      <a href="#">ACESSO À INFORMAÇÃO</a>
    </div>
    <div class="icones-sociais">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
    </div>
  </div>

  <div class="container-pesquisa">
    <div class="barra-pesquisa">
      <input type="text" placeholder="Digite sua Busca" />
    </div>
    <div class="opcoes-acesso">
      <a href="#"><i class="fa fa-envelope"></i> e-SIC</a>
      <a href="#"><i class="fa fa-comments"></i> Ouvidoria</a>
      <a href="#"><i class="fa fa-user"></i> Login</a>
    </div>
  </div>

  <div class="barra-laranja"></div>

  <div class="secao-conteudo">
    <br />
    <br />
    <h2>Solicitação de Processo Administrativo</h2>
    <br />
    <h3>Instrução de Processo Administrativo</h3>
    <div class="formulario-container">
      <form class="formulario-container" #processForm="ngForm" (ngSubmit)="submitRequest(processForm)">
        <div class="campo-container">
          <label for="requerente">Requerente*:</label>
          <input
            type="text"
            id="requerente"
            name="requerente"
            placeholder="Digite o nome completo..."
            required
            ngModel
            #requerente="ngModel"
          />

          <div *ngIf="requerente.invalid && (requerente.touched || requerente.dirty)" class="mensagem-erro">
            O campo Requerente é obrigatório.
          </div>

          <label for="cnpj">CNPJ / CPF*:</label>
          <input
            type="text"
            id="cnpj"
            name="cnpj"
            placeholder="Digite o CNPJ ou CPF..."
            required
            ngModel
            #cnpj="ngModel"
          />

          <div *ngIf="cnpj.invalid && (cnpj.touched || cnpj.dirty)" class="mensagem-erro">
            O campo CNPJ / CPF é obrigatório.
          </div>

          <label for="endereco">Endereço*:</label>
          <input
            type="text"
            id="endereco"
            name="endereco"
            placeholder="Digite o endereço..."
            required
            ngModel
            #endereco="ngModel"
          />

          <div *ngIf="endereco.invalid && (endereco.touched || endereco.dirty)" class="mensagem-erro">
            O campo Endereço é obrigatório.
          </div>

          <label for="bairro">Bairro:</label>
          <input
            type="text"
            id="bairro"
            name="bairro"
            placeholder="Digite o bairro..."
            ngModel
          />

          <label for="cidade">Cidade*:</label>
          <input
            type="text"
            id="cidade"
            name="cidade"
            placeholder="Digite a cidade..."
            required
            ngModel
            #cidade="ngModel"
          />
          
          <div *ngIf="cidade.invalid && (cidade.touched || cidade.dirty)" class="mensagem-erro">
            O campo Cidade é obrigatório.
          </div>

          <label for="codigo">Código:</label>
          <input
            type="text"
            id="codigo"
            name="codigo"
            placeholder="Digite o código..."
            ngModel
          />
        </div>
        <br />
        <h4>Motivo da Solicitação</h4>
        <br />
        <div class="motivos-container">
          <label
            ><input type="checkbox" name="motivo" value="pagamento" /> Doação em
            pagamento</label
          >
          <label
            ><input type="checkbox" name="motivo" value="revisao" /> Revisão de
            Área</label
          >
          <label
            ><input type="checkbox" name="motivo" value="cancelamento" />
            Cancelamento de Dívida Ativa</label
          >
          <label
            ><input type="checkbox" name="motivo" value="inativar" /> Inativar
            Inscrição</label
          >
          <label
            ><input type="checkbox" name="motivo" value="cadastro" /> Inscrição
            Cadastro Imobiliário</label
          >
          <label
            ><input type="checkbox" name="motivo" value="cadastrar" /> Cadastrar
            Inscrição</label
          >
          <label
            ><input type="checkbox" name="motivo" value="desmembramento" />
            Desmembramento de área</label
          >
          <label
            ><input type="checkbox" name="motivo" value="escritura" /> Escritura
            de Doação</label
          >
          <label
            ><input type="checkbox" name="motivo" value="tributos" />
            Restituição e Compensação de Tributos</label
          >
          <label
            ><input type="checkbox" name="motivo" value="execucao" />
            Cancelamento de Dívida ativa em Execução</label
          >
          <label
            ><input type="checkbox" name="motivo" value="certidao" /> Certidão e
            Cadastro de Lançamento de IPTU</label
          >
          <label
            ><input type="checkbox" name="motivo" value="averbacao" /> Certidão
            e Cadastro para Averbação</label
          >
        </div>

        <label for="outro">Outro:</label>
        <textarea
          id="outro"
          name="outro"
          placeholder="Digite aqui outro motivo..."
          ngModel
        ></textarea>

        <div class="botoes-container">
          <button type="button" class="botao-azul">
            <span class="material-icons">attach_file</span> ANEXAR DOCUMENTOS
          </button>
          <button type="submit" class="botao-verde">
            <span class="material-icons">send</span> SOLICITAR
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
